kind = "web"
previewPath = "/"
title = "LifePulse"
version = "1.0.0"
id = "artifacts/lifepulse"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19080

[services.development]
run = "cd /home/runner/workspace && npm install && npm run dev"

[services.production]
build = [ "sh", "-c", "cd /home/runner/workspace && npm run build" ]
serve = "static"
publicDir = "dist"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19080"
BASE_PATH = "/"
