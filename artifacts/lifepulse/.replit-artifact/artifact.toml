kind = "web"
previewPath = "/"
title = "LifePulse"
version = "1.0.0"
id = "artifacts/lifepulse"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19080

[services.development]
run = "pnpm --filter @workspace/lifepulse run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lifepulse", "run", "build" ]
serve = "static"
publicDir = "artifacts/lifepulse/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19080"
BASE_PATH = "/"
